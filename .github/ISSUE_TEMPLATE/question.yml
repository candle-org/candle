name: "Human: Question"
description: Ask a usage or project question
labels: ["question"]
title: "[Question]: "
body:
  - type: markdown
    attributes:
      value: |
        Before opening a question, check the [README](../../README.md), project docs, and existing issues — your answer might already be there.

  - type: textarea
    id: question
    attributes:
      label: What's your question?
      placeholder: How do I use candle with ... ?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Relevant context
      description: Which API, backend, device, or model is involved?
      placeholder: |
        I'm using the MPS backend on macOS and trying to ...
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you already tried?
      description: Optional — mention docs, code, or experiments you checked.
    validations:
      required: false
