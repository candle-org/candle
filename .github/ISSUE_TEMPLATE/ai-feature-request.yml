name: "AI: Feature Request"
description: Structured feature proposal generated or filed by an AI agent
labels: ["enhancement"]
title: "[AI Feature]: "
body:
  - type: dropdown
    id: tool
    attributes:
      label: Agent tool
      options:
        - Claude Code
        - Codex
        - Cursor
        - GitHub Copilot
        - Other
    validations:
      required: true

  - type: input
    id: linked
    attributes:
      label: Linked roadmap issue
      description: Every AI feature request must tie to a roadmap item.
      placeholder: "#204"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What user-facing problem does this solve? Reference the PyTorch API gap if applicable.
      placeholder: |
        `torch.nn.utils.parametrize` is used by HuggingFace transformers but not yet implemented in candle ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed implementation direction
      description: Summarize the approach. Mention which dispatch layer, backend, or schema changes are involved — do not paste full code.
      placeholder: |
        Add a `parametrize` module under `candle.nn.utils` that ...
        Dispatch: register via the existing schema system ...
        Backend: CPU-only initially, NPU follow-up ...
    validations:
      required: true

  - type: textarea
    id: areas
    attributes:
      label: Affected files or subsystems
      placeholder: |
        - src/candle/nn/utils/
        - src/candle/_dispatch/schemas.py
        - tests/cpu/test_parametrize.py
    validations:
      required: true

  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: Concrete, testable conditions.
      placeholder: |
        - [ ] `parametrize.register_parametrization()` works identically to PyTorch
        - [ ] Downstream code that calls this API runs without error
    validations:
      required: true
