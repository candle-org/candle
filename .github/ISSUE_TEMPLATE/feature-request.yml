name: "Human: Feature Request"
description: Propose a new feature or API improvement
labels: ["enhancement"]
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        candle aims for PyTorch API compatibility. If you need an op, module, or behavior that's missing or broken, tell us here.

  - type: textarea
    id: problem
    attributes:
      label: What's missing or broken for your workflow?
      description: Focus on the problem first, implementation second.
      placeholder: |
        I'm trying to use `torch.nn.TransformerEncoder` but candle doesn't support ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Describe the API, behavior, or workflow you want. PyTorch code examples are welcome.
      placeholder: |
        I'd like `candle.nn.TransformerEncoder` to accept the same args as PyTorch ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Optional — share workarounds or other approaches you tried.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to PyTorch docs, related issues, model compatibility needs, or benchmarks.
    validations:
      required: false
