name: "Human: Task (Sub-issue)"
description: Break a roadmap item or larger issue into a concrete task
title: "[Task]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this for concrete work items that contribute to a roadmap issue (e.g. #204, #205, #206) or any larger parent task.

  - type: input
    id: parent
    attributes:
      label: Parent issue or roadmap item
      description: Link the issue this task contributes to.
      placeholder: "#204"
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Task objective
      description: One or two sentences describing the deliverable.
      placeholder: Implement `torch.nn.functional.gelu` on the NPU backend so that ...
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope boundaries
      description: Be explicit about what is and isn't included, to keep the task focused.
      placeholder: |
        In scope:
        - NPU kernel for gelu via ACLNN
        - Tests in tests/npu/

        Out of scope:
        - CPU / MPS implementations (separate tasks)
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this task is done?
      placeholder: |
        - [ ] `pytest tests/npu/test_gelu.py` passes
        - [ ] Matches PyTorch output within atol=1e-5
    validations:
      required: true
