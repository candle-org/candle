name: "AI: Bug Report"
description: Structured bug report generated or filed by an AI agent
labels: ["bug"]
title: "[AI Bug]: "
body:
  - type: dropdown
    id: tool
    attributes:
      label: Agent tool
      options:
        - Claude Code
        - Codex
        - Cursor
        - GitHub Copilot
        - Other
    validations:
      required: true

  - type: input
    id: linked
    attributes:
      label: Related issue or roadmap item
      description: Link the parent issue if this bug was found during roadmap work.
      placeholder: "#205"
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: Structured summary
      description: 2-5 sentences. Include the op, backend, and failure mode.
      placeholder: |
        `candle.matmul` on NPU returns incorrect results for non-contiguous inputs.
        The ACLNN kernel silently produces zeros instead of raising an error.
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Relevant files or subsystems
      placeholder: |
        - src/candle/_backends/npu/ops.py
        - tests/npu/test_matmul.py
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Exact reproduction commands
      description: Must be runnable as-is. Use `import candle as torch`.
      render: shell
      placeholder: |
        source ~/miniconda3/etc/profile.d/conda.sh && conda run -n candle \
          python -c "import candle as torch; ..."
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed output
      description: Paste the actual terminal output — do not paraphrase.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: State the correct result. Reference PyTorch output if applicable.
    validations:
      required: true

  - type: textarea
    id: root_cause
    attributes:
      label: Verified root cause
      description: Only include if you traced the issue to a specific line or condition. Do not speculate.
    validations:
      required: false
