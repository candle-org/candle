name: "Human: Bug Report"
description: Report a reproducible bug in candle
labels: ["bug"]
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. The more detail you share, the faster we can fix it.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the incorrect behavior — include the op or API involved if possible.
      placeholder: |
        `candle.add(a, b)` returned the wrong shape.
        PyTorch returns shape (2, 3), candle returns (3, 2).
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: A minimal script is ideal. Use `import candle as torch` so we can run it directly.
      placeholder: |
        import candle as torch

        a = torch.randn(2, 3)
        b = torch.randn(2, 3)
        result = torch.add(a, b)
        print(result.shape)  # expected (2, 3), got ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: If there is a matching PyTorch behavior, mention it.
      placeholder: PyTorch returns shape (2, 3). candle should match.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Help us narrow down the issue.
      placeholder: |
        - OS: macOS 14.5 / Ubuntu 22.04
        - Python: 3.11
        - Device / backend: CPU / MPS / CUDA / NPU
        - candle commit: (git rev-parse --short HEAD)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, tracebacks, or screenshots
      description: Paste any relevant output. Tracebacks are especially helpful.
      render: shell
    validations:
      required: false
