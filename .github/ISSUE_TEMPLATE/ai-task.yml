name: "AI: Task"
description: Structured implementation task created by an AI agent
title: "[AI Task]: "
body:
  - type: dropdown
    id: tool
    attributes:
      label: Agent tool
      options:
        - Claude Code
        - Codex
        - Cursor
        - GitHub Copilot
        - Other
    validations:
      required: true

  - type: input
    id: parent
    attributes:
      label: Parent issue or roadmap item
      description: Link the roadmap issue or parent task this contributes to.
      placeholder: "#206"
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Task objective
      description: One or two sentences — what is the concrete deliverable?
      placeholder: |
        Implement `torch.distributed.all_reduce` for the HCCL backend so that
        distributed collective ops work on NPU.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope boundaries
      description: Clearly separate what is included from what is not.
      placeholder: |
        In scope:
        - HCCL all_reduce kernel binding
        - Integration test with 2-device setup

        Out of scope:
        - Gloo fallback
        - Multi-node support
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Testable conditions that prove the task is done.
      placeholder: |
        - [ ] `pytest tests/distributed/test_all_reduce.py` passes on 2× NPU
        - [ ] Output matches PyTorch reference within atol=1e-5
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Expected touched files
      description: Optional — helps reviewers scope the PR.
      placeholder: |
        - src/candle/distributed/
        - tests/distributed/test_all_reduce.py
    validations:
      required: false
