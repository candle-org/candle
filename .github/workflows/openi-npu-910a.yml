name: OpenI 910A NPU CI

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: Repository URL to clone inside the OpenI task
        required: true
        default: https://github.com/candle-org/candle.git
        type: string
      ref:
        description: Git ref or commit SHA to test remotely
        required: true
        default: main
        type: string
      image_id:
        description: OpenI image id
        required: true
        type: string
      image_name:
        description: OpenI image name
        required: true
        type: string
      spec_id:
        description: OpenI spec id (default 340 = 4-card 910A)
        required: true
        default: '340'
        type: string
      cluster:
        description: OpenI cluster name
        required: true
        default: C2Net
        type: string
      compute_source:
        description: OpenI compute source
        required: true
        default: NPU
        type: string
      has_internet:
        description: OpenI network policy
        required: true
        default: '2'
        type: string
      timeout_minutes:
        description: Workflow timeout in minutes
        required: true
        default: '120'
        type: string
      reuse_timeout_minutes:
        description: Reuse a running task until this many minutes, then stop and restart it
        required: true
        default: '210'
        type: string
      keep_task_on_failure:
        description: Keep remote task for debugging when a step fails
        required: true
        default: 'false'
        type: string

permissions:
  contents: read

jobs:
  openi-910a:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install orchestrator dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests websocket-client

      - name: Ensure OpenI task
        env:
          OPENI_COOKIE: ${{ secrets.OPENI_COOKIE }}
          OPENI_CSRF: ${{ secrets.OPENI_CSRF }}
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
        run: |
          python .github/scripts/openi_ci.py ensure-task \
            --repo-url "${{ inputs.repo_url }}" \
            --ref "${{ inputs.ref }}" \
            --image-id "${{ inputs.image_id }}" \
            --image-name "${{ inputs.image_name }}" \
            --spec-id "${{ inputs.spec_id }}" \
            --cluster "${{ inputs.cluster }}" \
            --compute-source "${{ inputs.compute_source }}" \
            --has-internet "${{ inputs.has_internet }}" \
            --reuse-timeout-minutes "${{ inputs.reuse_timeout_minutes }}" \
            --keep-task-on-failure "${{ inputs.keep_task_on_failure }}"

      - name: Wait for task to start
        env:
          OPENI_COOKIE: ${{ secrets.OPENI_COOKIE }}
          OPENI_CSRF: ${{ secrets.OPENI_CSRF }}
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
        run: |
          python .github/scripts/openi_ci.py wait-task

      - name: Prepare remote checkout
        env:
          OPENI_COOKIE: ${{ secrets.OPENI_COOKIE }}
          OPENI_CSRF: ${{ secrets.OPENI_CSRF }}
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
        run: |
          python .github/scripts/openi_ci.py prepare-remote \
            --repo-url "${{ inputs.repo_url }}" \
            --ref "${{ inputs.ref }}"

      - name: Run 910A suite remotely
        env:
          OPENI_COOKIE: ${{ secrets.OPENI_COOKIE }}
          OPENI_CSRF: ${{ secrets.OPENI_CSRF }}
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
        run: |
          python .github/scripts/openi_ci.py run-910a-suite

      - name: Fetch remote artifacts
        if: always()
        env:
          OPENI_COOKIE: ${{ secrets.OPENI_COOKIE }}
          OPENI_CSRF: ${{ secrets.OPENI_CSRF }}
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
        run: |
          python .github/scripts/openi_ci.py fetch-artifacts

      - name: Upload OpenI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openi-910a-results
          path: .artifacts/openi-910a/

      - name: Cleanup OpenI task
        if: always()
        env:
          OPENI_COOKIE: ${{ secrets.OPENI_COOKIE }}
          OPENI_CSRF: ${{ secrets.OPENI_CSRF }}
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
        run: |
          python .github/scripts/openi_ci.py cleanup-task \
            --keep-task-on-failure "${{ inputs.keep_task_on_failure }}"
