name: CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - 'src/candle/**'
      - 'tests/**'
      - '.github/workflows/**'
  push:
    branches: ["main"]
    paths:
      - 'src/candle/**'
      - 'tests/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  pylint-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/requirements-lint.txt
    - name: Lint with pylint
      run: |
        pylint --jobs=1 src/candle --rcfile=.github/pylint.conf

  test:
    needs: pylint-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/requirements-test.txt
    - name: Install candle
      run: |
        pip install -e .
    - name: Run tests
      run: |
        cd tests
        pytest . -v --tb=short \
          --ignore=test_ops_npu.py \
          --ignore=test_ddp.py \
          --ignore=test_ddp_cpu.py \
          --ignore=test_ddp_builtin_hooks.py \
          --ignore=test_ddp_comm_hook.py \
          --ignore=test_ddp_unused_params.py \
          --ignore=test_ddp_static_graph.py \
          --ignore=test_ddp_bucket_view.py \
          --ignore=test_gloo_ddp.py \
          --ignore=test_hccl_all_to_all_multicard.py
