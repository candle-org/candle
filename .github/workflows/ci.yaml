name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'assets/**'
      - 'benchmarks/**'
      - 'results/**'
      - 'compat/**'
      - 'scripts/**'
      - 'tools/**'
      - '*.md'
      - 'LICENSE'
      - 'bench_torch_npu.py'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
      - '.github/pull_request_template.md'
  push:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'assets/**'
      - 'benchmarks/**'
      - 'results/**'
      - 'compat/**'
      - 'scripts/**'
      - 'tools/**'
      - '*.md'
      - 'LICENSE'
      - 'bench_torch_npu.py'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
      - '.github/pull_request_template.md'

permissions:
  contents: read
  actions: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════
  # Detect which areas changed to skip unrelated jobs.
  # ════════════════════════════════════════════════════════════════

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      full-ci: ${{ steps.eval.outputs.full-ci }}
      run-cpu-tests: ${{ steps.eval.outputs.run-cpu-tests }}
      run-mps-tests: ${{ steps.eval.outputs.run-mps-tests }}
      run-npu-tests: ${{ steps.eval.outputs.run-npu-tests }}
      run-dist-tests: ${{ steps.eval.outputs.run-dist-tests }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push'
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            src:
              - 'src/candle/**'
            build:
              - 'setup.py'
              - 'pyproject.toml'
              - 'MANIFEST.in'
              - 'requirements/**'
            ci:
              - '.github/workflows/ci.yaml'
              - '.github/scripts/**'
              - '.github/pylint.conf'
            tests-cpu:
              - 'tests/cpu/**'
              - 'tests/contract/**'
            tests-mps:
              - 'tests/mps/**'
            tests-npu:
              - 'tests/npu/**'
            tests-dist:
              - 'tests/distributed/**'
            tests-infra:
              - 'tests/conftest.py'
      - id: eval
        run: |
          # Source, build config, CI config, or manual dispatch → full CI
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
             [[ "${{ steps.filter.outputs.src }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.build }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.ci }}" == "true" ]]; then
            FULL_CI=true
          else
            FULL_CI=false
          fi
          echo "full-ci=$FULL_CI" >> "$GITHUB_OUTPUT"

          INFRA="${{ steps.filter.outputs.tests-infra }}"

          run_if() { [[ "$FULL_CI" == "true" ]] || [[ "$1" == "true" ]] || [[ "$INFRA" == "true" ]]; }

          run_if "${{ steps.filter.outputs.tests-cpu }}" && echo "run-cpu-tests=true" >> "$GITHUB_OUTPUT" || echo "run-cpu-tests=false" >> "$GITHUB_OUTPUT"
          run_if "${{ steps.filter.outputs.tests-mps }}" && echo "run-mps-tests=true" >> "$GITHUB_OUTPUT" || echo "run-mps-tests=false" >> "$GITHUB_OUTPUT"
          run_if "${{ steps.filter.outputs.tests-npu }}" && echo "run-npu-tests=true" >> "$GITHUB_OUTPUT" || echo "run-npu-tests=false" >> "$GITHUB_OUTPUT"
          run_if "${{ steps.filter.outputs.tests-dist }}" && echo "run-dist-tests=true" >> "$GITHUB_OUTPUT" || echo "run-dist-tests=false" >> "$GITHUB_OUTPUT"

  pylint-check:
    needs: detect-changes
    if: needs.detect-changes.outputs.full-ci == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        cache-dependency-paths: requirements/requirements-lint.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/requirements-lint.txt
    - name: Lint with pylint
      run: |
        pylint --jobs=1 src/candle --rcfile=.github/pylint.conf

  # ════════════════════════════════════════════════════════════════
  # All test jobs run in parallel after pylint passes.
  # On failure any job calls gh api to cancel the entire workflow run
  # so remaining siblings stop immediately (cross-job fail-fast).
  # ════════════════════════════════════════════════════════════════

  test-cpu:
    needs: [detect-changes, pylint-check]
    if: >
      !cancelled() &&
      needs.detect-changes.outputs.run-cpu-tests == 'true' &&
      (needs.pylint-check.result == 'success' || needs.pylint-check.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPRESS: 'true'
      CCACHE_MAXSIZE: '200M'
      CC: ccache gcc
      CXX: ccache g++
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-paths: |
          requirements/requirements-test.txt
          requirements/requirements.txt

    # ── ccache ────────────────────────────────────────────────────
    - name: Set up ccache
      run: |
        sudo apt-get install -y ccache
        echo "/usr/lib/ccache" >> $GITHUB_PATH
    - name: Cache ccache data
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-linux-py${{ matrix.python-version }}-${{ hashFiles('src/**/*.pyx', 'setup.py') }}
        restore-keys: |
          ccache-linux-py${{ matrix.python-version }}-

    # ── Cython build artifacts ────────────────────────────────────
    - name: Cache Cython build artifacts
      id: cython-cache
      uses: actions/cache@v4
      with:
        path: |
          build/
          src/candle/_cython/*.c
          src/candle/_cython/*.so
          src/candle/_generated/*.c
          src/candle/_generated/*.so
          src/candle/distributed/*.c
          src/candle/distributed/*.so
        key: cython-linux-py${{ matrix.python-version }}-${{ hashFiles('src/**/*.pyx', 'setup.py', 'pyproject.toml') }}
    - name: Freshen cached build artifacts
      if: steps.cython-cache.outputs.cache-hit == 'true'
      run: |
        find src/ build/ \( -name '*.c' -o -name '*.o' -o -name '*.so' \) \
          -exec touch {} + 2>/dev/null || true

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install 'cython>=3.0' 'setuptools>=68.0' wheel
        pip install -r requirements/requirements-test.txt
    - name: Install candle
      run: |
        pip install -e . --no-build-isolation -v
    - name: ccache statistics
      if: always()
      run: ccache -s
    - name: Run CPU tests
      id: run-tests
      run: |
        pytest tests/cpu/ tests/contract/ -v --tb=short
    - name: Cancel workflow on failure
      if: steps.run-tests.outcome == 'failure'
      run: |
        gh run cancel ${{ github.run_id }} --repo ${{ github.repository }} || true
      env:
        GH_TOKEN: ${{ github.token }}

  test-mps:
    needs: [detect-changes, pylint-check]
    if: >
      !cancelled() &&
      needs.detect-changes.outputs.run-mps-tests == 'true' &&
      (needs.pylint-check.result == 'success' || needs.pylint-check.result == 'skipped')
    runs-on: macos-14
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPRESS: 'true'
      CCACHE_MAXSIZE: '200M'
      CC: ccache clang
      CXX: ccache clang++
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        cache-dependency-paths: |
          requirements/requirements-test-mps.txt
          requirements/requirements.txt

    # ── ccache ────────────────────────────────────────────────────
    - name: Set up ccache
      run: |
        brew install ccache
        echo "$(brew --prefix ccache)/libexec" >> $GITHUB_PATH
    - name: Cache ccache data
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-macos-py3.11-${{ hashFiles('src/**/*.pyx', 'setup.py') }}
        restore-keys: |
          ccache-macos-py3.11-

    # ── Cython build artifacts ────────────────────────────────────
    - name: Cache Cython build artifacts
      id: cython-cache
      uses: actions/cache@v4
      with:
        path: |
          build/
          src/candle/_cython/*.c
          src/candle/_cython/*.so
          src/candle/_generated/*.c
          src/candle/_generated/*.so
          src/candle/distributed/*.c
          src/candle/distributed/*.so
        key: cython-macos-py3.11-${{ hashFiles('src/**/*.pyx', 'setup.py', 'pyproject.toml') }}
    - name: Freshen cached build artifacts
      if: steps.cython-cache.outputs.cache-hit == 'true'
      run: |
        find src/ build/ \( -name '*.c' -o -name '*.o' -o -name '*.so' \) \
          -exec touch {} + 2>/dev/null || true

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install 'cython>=3.0' 'setuptools>=68.0' wheel
        pip install -r requirements/requirements-test-mps.txt
    - name: Install candle
      run: |
        pip install -e . --no-build-isolation -v
    - name: ccache statistics
      if: always()
      run: ccache -s
    - name: Verify MPS availability
      run: |
        python -c "from candle._backends.mps.runtime import is_available; print('MPS available:', is_available())"
    - name: Run MPS tests
      id: run-tests
      run: |
        pytest tests/mps/ -v --tb=short
    - name: Cancel workflow on failure
      if: steps.run-tests.outcome == 'failure'
      run: |
        gh run cancel ${{ github.run_id }} --repo ${{ github.repository }} || true
      env:
        GH_TOKEN: ${{ github.token }}

  # ── NPU 910B runners ───────────────────────────────────────────

  test-npu-910b-unit:
    needs: [detect-changes, pylint-check]
    if: >
      !cancelled() &&
      needs.detect-changes.outputs.run-npu-tests == 'true' &&
      (needs.pylint-check.result == 'success' || needs.pylint-check.result == 'skipped')
    runs-on: [self-hosted, npu-unit]
    timeout-minutes: 30
    env:
      CCACHE_DIR: /tmp/candle-ccache
      CCACHE_COMPRESS: 'true'
      CCACHE_MAXSIZE: '200M'
      CC: ccache gcc
      CXX: ccache g++
      GH_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up ccache
      run: ccache --version
    - name: Cache Cython build artifacts
      id: cython-cache
      uses: actions/cache@v4
      with:
        path: |
          build/
          src/candle/_cython/*.c
          src/candle/_cython/*.so
          src/candle/_generated/*.c
          src/candle/_generated/*.so
          src/candle/distributed/*.c
          src/candle/distributed/*.so
        key: cython-npu-${{ hashFiles('src/**/*.pyx', 'setup.py', 'pyproject.toml') }}
    - name: Freshen cached build artifacts
      if: steps.cython-cache.outputs.cache-hit == 'true'
      run: |
        find src/ build/ \( -name '*.c' -o -name '*.o' -o -name '*.so' \) \
          -exec touch {} + 2>/dev/null || true
    - name: Install candle
      run: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate candle
        pip install -e .
    - name: ccache statistics
      if: always()
      run: ccache -s
    - name: Run NPU common + 910B op tests
      id: run-tests
      run: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate candle
        bash .github/scripts/ci-failfast-watcher.sh \
          pytest tests/npu/common/ tests/npu/910b/ -v --tb=short
    - name: Cancel workflow on failure
      if: steps.run-tests.outcome == 'failure'
      run: |
        gh run cancel ${{ github.run_id }} --repo ${{ github.repository }} || true
      env:
        GH_TOKEN: ${{ github.token }}

  test-npu-910b-integ:
    needs: [detect-changes, pylint-check]
    if: >
      !cancelled() &&
      needs.detect-changes.outputs.run-npu-tests == 'true' &&
      (needs.pylint-check.result == 'success' || needs.pylint-check.result == 'skipped')
    runs-on: [self-hosted, npu-integ]
    timeout-minutes: 30
    env:
      CCACHE_DIR: /tmp/candle-ccache
      CCACHE_COMPRESS: 'true'
      CCACHE_MAXSIZE: '200M'
      CC: ccache gcc
      CXX: ccache g++
      GH_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up ccache
      run: ccache --version
    - name: Cache Cython build artifacts
      id: cython-cache
      uses: actions/cache@v4
      with:
        path: |
          build/
          src/candle/_cython/*.c
          src/candle/_cython/*.so
          src/candle/_generated/*.c
          src/candle/_generated/*.so
          src/candle/distributed/*.c
          src/candle/distributed/*.so
        key: cython-npu-${{ hashFiles('src/**/*.pyx', 'setup.py', 'pyproject.toml') }}
    - name: Freshen cached build artifacts
      if: steps.cython-cache.outputs.cache-hit == 'true'
      run: |
        find src/ build/ \( -name '*.c' -o -name '*.o' -o -name '*.so' \) \
          -exec touch {} + 2>/dev/null || true
    - name: Install candle
      run: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate candle
        pip install -e .
    - name: ccache statistics
      if: always()
      run: ccache -s
    - name: Run NPU integration tests
      id: run-tests
      run: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate candle
        bash .github/scripts/ci-failfast-watcher.sh \
          pytest tests/npu/ -v --tb=short \
          --ignore=tests/npu/common \
          --ignore=tests/npu/910a \
          --ignore=tests/npu/910b \
          --ignore=tests/npu/310b \
          --ignore=tests/npu/310p
    - name: Cancel workflow on failure
      if: steps.run-tests.outcome == 'failure'
      run: |
        gh run cancel ${{ github.run_id }} --repo ${{ github.repository }} || true
      env:
        GH_TOKEN: ${{ github.token }}

  test-npu-910b-dist:
    needs: [detect-changes, test-npu-910b-unit, test-npu-910b-integ]
    if: >
      !cancelled() &&
      (needs.detect-changes.outputs.run-npu-tests == 'true' || needs.detect-changes.outputs.run-dist-tests == 'true') &&
      (needs.test-npu-910b-unit.result == 'success' || needs.test-npu-910b-unit.result == 'skipped') &&
      (needs.test-npu-910b-integ.result == 'success' || needs.test-npu-910b-integ.result == 'skipped')
    runs-on: [self-hosted, npu-dist]
    timeout-minutes: 45
    env:
      CCACHE_DIR: /tmp/candle-ccache
      CCACHE_COMPRESS: 'true'
      CCACHE_MAXSIZE: '200M'
      CC: ccache gcc
      CXX: ccache g++
      GH_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up ccache
      run: ccache --version
    - name: Cache Cython build artifacts
      id: cython-cache
      uses: actions/cache@v4
      with:
        path: |
          build/
          src/candle/_cython/*.c
          src/candle/_cython/*.so
          src/candle/_generated/*.c
          src/candle/_generated/*.so
          src/candle/distributed/*.c
          src/candle/distributed/*.so
        key: cython-npu-${{ hashFiles('src/**/*.pyx', 'setup.py', 'pyproject.toml') }}
    - name: Freshen cached build artifacts
      if: steps.cython-cache.outputs.cache-hit == 'true'
      run: |
        find src/ build/ \( -name '*.c' -o -name '*.o' -o -name '*.so' \) \
          -exec touch {} + 2>/dev/null || true
    - name: Install candle
      run: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate candle
        pip install -e .
    - name: ccache statistics
      if: always()
      run: ccache -s
    - name: Run HCCL distributed tests
      id: run-tests
      run: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate candle
        bash .github/scripts/ci-failfast-watcher.sh \
          pytest tests/distributed/ -v --tb=short -k "hccl"
    - name: Cancel workflow on failure
      if: steps.run-tests.outcome == 'failure'
      run: |
        gh run cancel ${{ github.run_id }} --repo ${{ github.repository }} || true
      env:
        GH_TOKEN: ${{ github.token }}

  # ── NPU 910A runners ───────────────────────────────────────────

  test-npu-910a:
    name: NPU 910A Suite (6-7)
    needs: [detect-changes, pylint-check]
    if: >
      !cancelled() &&
      needs.detect-changes.outputs.run-npu-tests == 'true' &&
      (needs.pylint-check.result == 'success' || needs.pylint-check.result == 'skipped')
    runs-on: [self-hosted, linux, ascend, 910a, npu-6-7]
    timeout-minutes: 90
    env:
      CONDA_EXE: /home/lvyufeng/miniconda3/bin/conda
      ASCEND_ENV_SCRIPT: /usr/local/Ascend/ascend-toolkit/set_env.sh
      ASCEND_REQUIRED_GROUP: HwHiAiUser
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
      PYTHONNOUSERSITE: '1'
      ASCEND_RT_VISIBLE_DEVICES: 6,7
      ASCEND_VISIBLE_DEVICES: 6,7
      JOB_CONDA_ENV: /tmp/candle-npu-ci-6-7
      CCACHE_DIR: /tmp/candle-ccache
      CCACHE_COMPRESS: 'true'
      CCACHE_MAXSIZE: '200M'
      CC: ccache gcc
      CXX: ccache g++
      GH_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up ccache
      run: ccache --version
    - name: Cache Cython build artifacts
      id: cython-cache
      uses: actions/cache@v4
      with:
        path: |
          build/
          src/candle/_cython/*.c
          src/candle/_cython/*.so
          src/candle/_generated/*.c
          src/candle/_generated/*.so
          src/candle/distributed/*.c
          src/candle/distributed/*.so
        key: cython-npu-910a-${{ hashFiles('src/**/*.pyx', 'setup.py', 'pyproject.toml') }}
    - name: Freshen cached build artifacts
      if: steps.cython-cache.outputs.cache-hit == 'true'
      run: |
        find src/ build/ \( -name '*.c' -o -name '*.o' -o -name '*.so' \) \
          -exec touch {} + 2>/dev/null || true
    - name: Prepare conda environment
      run: |
        "$CONDA_EXE" create -y -p "$JOB_CONDA_ENV" python=3.11 pip
    - name: Install dependencies
      run: |
        "$JOB_CONDA_ENV/bin/python" -m pip install --upgrade pip
        "$JOB_CONDA_ENV/bin/python" -m pip install -r requirements/requirements-test.txt
    - name: Install candle
      run: |
        "$JOB_CONDA_ENV/bin/python" -m pip install -e .
    - name: Assert NPU availability
      run: |
        source "$ASCEND_ENV_SCRIPT"
        clean_env() {
          local cmd
          printf -v cmd '%q ' \
          env -i \
            HOME="$HOME" \
            PATH="$JOB_CONDA_ENV/bin:${ASCEND_TOOLKIT_HOME}/bin:${ASCEND_TOOLKIT_HOME}/compiler/ccec_compiler/bin:${ASCEND_TOOLKIT_HOME}/tools/ccec_compiler/bin:/usr/bin:/bin" \
            LANG="${LANG:-C.UTF-8}" \
            LD_LIBRARY_PATH="$LD_LIBRARY_PATH" \
            PYTHONPATH="${PYTHONPATH:-}" \
            ASCEND_TOOLKIT_HOME="$ASCEND_TOOLKIT_HOME" \
            ASCEND_AICPU_PATH="$ASCEND_AICPU_PATH" \
            ASCEND_OPP_PATH="$ASCEND_OPP_PATH" \
            TOOLCHAIN_HOME="$TOOLCHAIN_HOME" \
            ASCEND_HOME_PATH="$ASCEND_HOME_PATH" \
            ASCEND_RT_VISIBLE_DEVICES="$ASCEND_RT_VISIBLE_DEVICES" \
            ASCEND_VISIBLE_DEVICES="$ASCEND_VISIBLE_DEVICES" \
            PYTEST_DISABLE_PLUGIN_AUTOLOAD="$PYTEST_DISABLE_PLUGIN_AUTOLOAD" \
            PYTHONNOUSERSITE="$PYTHONNOUSERSITE" \
            GH_TOKEN="$GH_TOKEN" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            "$@"
          /usr/bin/sg "$ASCEND_REQUIRED_GROUP" -c "$cmd"
        }
        clean_env python -c "import candle as torch; count = torch.npu.device_count(); assert torch.npu.is_available(), 'expected NPU to be available in NPU Suite (6-7)'; assert count >= 2, f'expected >=2 visible NPUs, found {count}'"
    - name: Run NPU tests
      id: run-tests
      run: |
        source "$ASCEND_ENV_SCRIPT"
        clean_env() {
          local cmd
          printf -v cmd '%q ' \
          env -i \
            HOME="$HOME" \
            PATH="$JOB_CONDA_ENV/bin:${ASCEND_TOOLKIT_HOME}/bin:${ASCEND_TOOLKIT_HOME}/compiler/ccec_compiler/bin:${ASCEND_TOOLKIT_HOME}/tools/ccec_compiler/bin:/usr/bin:/bin" \
            LANG="${LANG:-C.UTF-8}" \
            LD_LIBRARY_PATH="$LD_LIBRARY_PATH" \
            PYTHONPATH="${PYTHONPATH:-}" \
            ASCEND_TOOLKIT_HOME="$ASCEND_TOOLKIT_HOME" \
            ASCEND_AICPU_PATH="$ASCEND_AICPU_PATH" \
            ASCEND_OPP_PATH="$ASCEND_OPP_PATH" \
            TOOLCHAIN_HOME="$TOOLCHAIN_HOME" \
            ASCEND_HOME_PATH="$ASCEND_HOME_PATH" \
            ASCEND_RT_VISIBLE_DEVICES="$ASCEND_RT_VISIBLE_DEVICES" \
            ASCEND_VISIBLE_DEVICES="$ASCEND_VISIBLE_DEVICES" \
            PYTEST_DISABLE_PLUGIN_AUTOLOAD="$PYTEST_DISABLE_PLUGIN_AUTOLOAD" \
            PYTHONNOUSERSITE="$PYTHONNOUSERSITE" \
            GH_TOKEN="$GH_TOKEN" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            "$@"
          /usr/bin/sg "$ASCEND_REQUIRED_GROUP" -c "$cmd"
        }
        clean_env bash .github/scripts/ci-failfast-watcher.sh \
          pytest tests/npu/ -v --tb=short \
          --ignore=tests/npu/test_pipeline_npu_bench_smoke.py \
          --ignore=tests/npu/910b/ \
          --ignore=tests/npu/310b/ \
          --ignore=tests/npu/310p/
    - name: Cancel workflow on failure
      if: steps.run-tests.outcome == 'failure'
      run: |
        gh run cancel ${{ github.run_id }} --repo ${{ github.repository }} || true
      env:
        GH_TOKEN: ${{ github.token }}

  test-npu-910a-dist-2card:
    name: 910A Distributed (4-5)
    needs: [detect-changes, pylint-check]
    if: >
      !cancelled() &&
